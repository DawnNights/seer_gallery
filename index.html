<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>醉星河的画廊</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== Top Bar ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 id="title">醉星河的画廊</h1>
      <button id="backBtn" class="btn">← 返回</button>
    </div>
    <div class="topbar-right">
      <span id="r18Badge" class="r18-badge-top" style="display:none" role="button" tabindex="0">R18</span>
      <input id="searchInput" type="text" placeholder="搜索作品名或标签…">
    </div>
  </header>

  <!-- ===== Tag Cloud ===== -->
  <div id="tagCloud" class="tag-cloud"></div>

  <!-- ===== Main Content ===== -->
  <main id="main" class="fade-in"></main>

  <!-- ===== Footer ===== -->
  <footer>
    <div id="footerTip" class="footer-tip"></div>
    <p>欢迎加入 <a href="https://qm.qq.com/q/yYADZY2Pe2" target="_blank">醉星河的备用基地</a> 交流反馈</p>
  </footer>

  <!-- ===== Image Viewer ===== -->
  <div id="viewer" style="display:none">
    <button id="vClose" class="v-close">✕</button>
    <div class="v-img-area">
      <span class="nav nav-prev" id="vPrev">‹</span>
      <img id="vImg" src="" draggable="false">
      <span class="nav nav-next" id="vNext">›</span>
    </div>
    <div class="v-meta">
      <div class="v-meta-row">
        <span id="vTitle" class="v-title"></span>
        <span id="vCounter" class="v-counter"></span>
      </div>
      <div id="vTags" class="v-tags"></div>
      <div id="vCommentArea" class="v-comment-area"></div>
    </div>
  </div>

  <!-- ===== Video Overlay ===== -->
  <div id="videoOverlay" class="video-overlay" style="display:none">
    <div class="video-wrapper-inner">
      <button class="v-close v-close-video">✕</button>
      <video id="videoPlayer" controls playsInline></video>
    </div>
  </div>

  <!-- ===== Custom Modal ===== -->
  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <p id="modalMsg" class="modal-msg"></p>
      <div id="modalButtons" class="modal-buttons"></div>
    </div>
  </div>

  <!-- ===== Cusdis ===== -->
  <script>window.CUSDIS_LOCALE = {
    powered_by: '评论由 Cusdis 提供',
    post_comment: '发送',
    loading: '加载中',
    email: '邮箱地址 (可选)',
    nickname: '昵称（随便填）',
    reply_placeholder: '回复内容…',
    reply_btn: '回复',
    sending: '发送中…',
    mod_badge: '管理员',
    content_is_required: '内容不能为空',
    nickname_is_required: '昵称不能为空',
    comment_has_been_sent: '评论已发送，管理员审核通过后会展示',
  }</script>
  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

  <script src="gallery.js"></script>
</body>
</html>
