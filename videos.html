<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频画廊</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .video-card {
            position: relative;
        }

        .video-card video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
        }

        .video-card::after {
            content: '▶';
            position: absolute;
            font-size: 42px;
            color: rgba(255, 255, 255, 0.9);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .card.active {
            outline: 2px solid #0078ff;
        }

        /* 评论区 */
        .comment-toggle {
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            padding: 10px 12px;
            font-weight: 600;
        }

        .comment-toggle span {
            color: #0078ff;
            font-size: 0.9rem;
        }

        .comment-body {
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .comment-body.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .comment-body.expanded {
            max-height: 2000px;
            opacity: 1;
        }

        #comment-wrapper {
            margin-bottom: 16px;
            background: #fff;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <header class="topbar">
        <h1>视频画廊</h1>
    </header>

    <main id="main"></main>

    <script>
        window.CUSDIS_LOCALE = {
            powered_by: '评论由 Cusdis 提供',
            post_comment: '发送',
            loading: '加载中',
            email: '邮箱地址 (可选)',
            nickname: '昵称（随便填）',
            reply_placeholder: '回复内容…',
            reply_btn: '回复',
            sending: '发送中…',
            mod_badge: '管理员',
            content_is_required: '内容不能为空',
            nickname_is_required: '昵称不能为空',
            comment_has_been_sent: '评论已发送，管理员审核通过后会展示',
        }
    </script>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <script>
        const videos = {
            "邀君共寝·奥菲利娅": "26041009",
            "捣蛋诱惑·米修莉": "26032807",
            "触手嬉戏·嘲凤": "26032901",
            "任性败北·龙琰x风纪调教·希拓": "26031706",
            "盛大高潮·寂娆": "26030801",
            "紫薇表演·圣华": "26021504",
            "触手时刻·沧岚": "26021301",
            "绳牵闲步·灵巢": "26021202",
        };

        const BASE_URL = "https://gcore.jsdelivr.net/gh/dawnnights/seer_gallery@main/.video/";
        const CUSDIS_APP_ID = "0a430d73-5f2b-4da9-963f-e3b6991dfbab";

        const main = document.getElementById('main');

        // === 评论区 ===
        const commentWrapper = document.createElement('div');
        const commentThread = document.createElement('div');

        let commentExpanded = false;
        let cusdisLoaded = false;

        function initComment() {
            const toggle = document.createElement('div');
            toggle.className = 'comment-toggle';

            const title = document.createElement('div');
            title.textContent = '💬 评论区';

            const action = document.createElement('span');
            action.textContent = '展开';

            toggle.append(title, action);

            const body = document.createElement('div');
            body.className = 'comment-body collapsed';
            body.appendChild(commentThread);

            commentWrapper.append(toggle, body);

            toggle.onclick = () => {
                commentExpanded = !commentExpanded;

                body.classList.toggle('expanded', commentExpanded);
                body.classList.toggle('collapsed', !commentExpanded);
                action.textContent = commentExpanded ? '收起' : '展开';

                if (commentExpanded && !cusdisLoaded) {
                    loadCusdis();
                    cusdisLoaded = true;
                }
            };
        }

        function loadCusdis() {
            commentThread.innerHTML = '';

            commentThread.setAttribute('data-host', 'https://cusdis.com');
            commentThread.setAttribute('data-app-id', CUSDIS_APP_ID);
            commentThread.setAttribute('data-page-id', 'video-page');
            commentThread.setAttribute('data-page-title', '视频画廊');
            commentThread.setAttribute('data-lang', 'zh-cn');

            window.CUSDIS && window.CUSDIS.renderTo(commentThread);
        }

        // === 渲染视频 ===
        function renderVideos() {
            const grid = document.createElement('div');
            grid.className = 'grid';

            Object.entries(videos).forEach(([name, id]) => {
                const card = document.createElement('div');
                card.className = 'card video-card';

                const video = document.createElement('video');
                video.poster = BASE_URL + id + ".jpg";
                video.preload = "none";

                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = name;

                card.append(video, title);

                card.onclick = () => openVideo(id, card);

                grid.append(card);
            });

            main.append(grid);
        }

        // ✅ 新：弹窗视频播放
        function openVideo(id, card) {
            document.getElementById('viewer')?.remove();

            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');

            const viewer = document.createElement('div');
            viewer.id = 'viewer';

            const video = document.createElement('video');
            video.src = BASE_URL + id + ".mp4";
            video.controls = true;
            video.autoplay = true;

            // 📱 移动端关键
            video.playsInline = true;
            video.style.maxWidth = '90%';
            video.style.maxHeight = '80%';
            video.style.borderRadius = '12px';
            video.style.background = '#000';

            viewer.appendChild(video);
            document.body.appendChild(viewer);

            // 点击背景关闭
            viewer.addEventListener('click', (e) => {
                if (e.target === viewer) {
                    video.pause();
                    viewer.remove();
                }
            });
        }

        // ESC 关闭（PC）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('viewer')?.remove();
            }
        });

        // === 初始化 ===
        initComment();
        main.append(commentWrapper);
        renderVideos();

    </script>

</body>

</html>
